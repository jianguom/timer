name = "timer"
main = "_worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[env.production]
name = "timer"

[env.staging]
name = "timer-staging"

# 绑定 KV 数据库
[[kv_namespaces]]
binding = "RENEW_KV"
id = "6523dfe8edc74979803cf4ceeafb88d4"
preview_id = "6523dfe8edc74979803cf4ceeafb88d4"

# 设置定时任务 (Cron Triggers)
# 这里设置每 10 分钟检查一次 (0,10,20,30,40,50 * * * *)
# 必须设置这个，否则自动续期和通知功能无法触发
[triggers]
crons = ["0,10,20,30,40,50 * * * *"]

# 环境变量默认值 (可选)
# 部署时通常会提示用户输入，这里作为默认值
[vars]
AUTH_PASSWORD = "admin"

